<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINARA | Pranav P R - Art Gallery</title>
    <meta name="description"
        content="Official portfolio of Pranav P R, an aspiring color pencil portrait artist. Explore the LUMINARA gallery.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="#home" class="logo">LUMINARA</a>
        <ul class="nav-links">
            <li><a href="#home" class="nav-item" data-page="home">Home</a></li>
            <li><a href="#art" class="nav-item" data-page="art">Art</a></li>
            <li><a href="#about" class="nav-item" data-page="about">About</a></li>
            <li><a href="#contact" class="nav-item" data-page="contact">Contact</a></li>
        </ul>
    </nav>

    <main id="app-root" class="fade-in">
        <!-- Content will be injected here by script.js -->
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Full Screen Preview">
            <div id="lightbox-caption" class="lightbox-caption"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
